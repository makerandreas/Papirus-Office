name: Papirus Office CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *' # Daily nightly builds at 2:00 AM UTC

jobs:
  build:
    name: Build & Test (SemVer & Nightly)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Retrieve C++ OOXML compatibility engines & LibreOffice core if bundled

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 1. KUNCI KONSISTENSI: Buat Keystore statis dengan tanggal kedaluwarsa panjang
      # Kunci ini akan selalu sama di setiap commit, sehingga Kamu bisa menimpa aplikasi tanpa uninstall!
      - name: Generate Automated Testing Keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/release.jks \
            -alias papirus_key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "papirus123" \
            -keypass "papirus123" \
            -dname "CN=Andreas Maker, OU=Papirus Office, O=Anyum Software, L=Sorong, S=Southwest Papua, C=ID"

      - name: Build Debug APK
        run: |
          # HAPUS BERKAS STUB: Singkirkan kelas tiruan lokal agar tidak bentrok dengan .jar asli di peladen
          rm -rf app/src/main/java/com/sun/star
          
          chmod +x gradlew
          ./gradlew assembleDebug
        env:
          KEYSTORE_PASSWORD: papirus123
          KEY_ALIAS: papirus_key
          KEY_PASSWORD: papirus123

      # SOLUSI JALUR APK MENTAH: Langsung bypass ke halaman GitHub Release Nightly
      - name: Drop Papirus Nightly Release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "nightly"
          prerelease: true
          title: "Papirus Office Nightly Build"
          files: |
            app/build/outputs/apk/debug/*.apk
