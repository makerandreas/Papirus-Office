name: Papirus Office CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *' # Daily nightly builds at 2:00 AM UTC

jobs:
  build:
    name: Build & Test (SemVer & Nightly)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Retrieve C++ OOXML compatibility engines & LibreOffice core if bundled

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true

      - name: Run Unit & Robolectric Tests
        run: ./gradlew testDebugUnitTest --continue

      - name: Decode keystore
        id: decode_keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/my-upload-key.jks
            echo "KEYSTORE_DECODED=true" >> $GITHUB_ENV
          else
            echo "KEYSTORE_DECODED=false" >> $GITHUB_ENV
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release Bundle (AAB) & APK
        if: github.ref == 'refs/heads/main' && env.KEYSTORE_DECODED == 'true'
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PATH: "my-upload-key.jks"
        run: ./gradlew bundleRelease assembleRelease

      - name: Upload Debug Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: papirus-office-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release Artifacts
        if: github.ref == 'refs/heads/main' && env.KEYSTORE_DECODED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: papirus-office-release-bundle
          path: |
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/apk/release/*.apk
